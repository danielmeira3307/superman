<!DOCTYPE html>
<html lang="pt-br">
<head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Superman</title>
        <link rel="stylesheet" href="style.css"> 
<style>
    *{
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    body {
        background-image: linear-gradient(to top, #9A2E00, black, #073660);
        background-attachment: fixed;
        margin: 0%;
        padding: 0%;
        box-sizing: border-box;
    }
    header {
        background-color:  #095699 ; color: white;
        box-shadow: 2px 2px 2px black;
    }
    h1#principal {
        text-align: center;
        background-color:  #1782df ; color: white;
        padding: 15px;
        margin: 20px 0px 0px 0px;
    }
    nav {
        padding: 10px 10px;
    }
    nav > a {
        display: inline-block;
        background-color:  #095699 ; color: white;
        font-weight: bold;
        font-family: Arial, Helvetica, sans-serif;
        text-decoration: none;
        padding: 0px 10px;
    }
    nav > a:hover {
        background-color:#1782df;
        padding: 5px 20px;
        transition: 0.5s;
    }

    footer {
        background-color: black;
        padding: 10px;
    }
    
    footer img {
        height: 40px;
        width: 40px;
    }

    footer img:hover {
        background-color: transparent;
        padding: 2px;
    }

    .tudum {
        position: absolute;
        width: 100px;
        height: 54px;
        left: 50%;
    }
</style>
</head>
<body>
    <!-- Em HTML é id = em CSS é # -->
    <!-- em HTML é class = em CSS é . -->
    <!-- Representação por nomes -->
    <header>
        <h1 id="principal">SUPERMAN</h1>
            <nav>
                <a href="index2.html" id="n1"> Planeta Diário</a>
                <a href="index3.html" id="n2"> Personagens</a>
            </nav>
    </header>

    <footer>
        <a href="https://www.instagram.com/tudum_ia/" target="_blank" rel="external"><img src="instagram logo.png" alt="instagram"></a>
        <img src="tudum.jpg" alt="tudum" class="tudum">
    </footer>

</body>
</html>
